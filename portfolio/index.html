<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;500;600;700;800&family=Indie+Flower&display=swap"
      rel="stylesheet" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Portfolio</title>
  </head>
  <body>
    <aside id="side-nav">
      <div class="side-nav__content">
        <div class="side-nav__content--logo">
          <img src="img//logo-01.jpg" alt="logo" />
        </div>
        <ul class="side-nav__content--social">
          <a href="#"><i class="fa fa-facebook"></i></a>
          <a href="#"><i class="fa fa-twitter"></i></a>
          <a href="#"><i class="fa fa-linkedin"></i></a>
          <a href="#"><i class="fa fa-instagram"></i></a>
          <a href="#"><i class="fa fa-dribbble"></i></a>
          <a href="#"><i class="fa fa-pinterest-p"></i></a>
        </ul>
      </div>
    </aside>
    <main>
      <header id="header">
        <div class="header__main-nav">
          <div class="header__main-nav--hamburger">
            <div class="line line-1"></div>
            <div class="line line-2"></div>
            <div class="line line-3"></div>
          </div>
          <ul class="header__main-nav--links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Hire Me</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </div>
      </header>
      <section class="hero">
        <div class="hero__content">
          <h1 class="hero__content--title">Scarlet Tyler</h1>
          <p class="hero__content--para">Frontend Developer</p>
          <a href="#" class="hero__content--link">My Work</a>
        </div>
      </section>
      <section class="skills">
        <div class="skills__design">
          <h3 class="skills__design--title">Design Skills</h3>

          <h4>Web Design</h4>
          <div class="skills__design--progress">
            <span class="skills__design--progress__1"></span>
          </div>
          <h4>Logo Design</h4>
          <div class="skills__design--progress">
            <span class="skills__design--progress__2"></span>
          </div>
          <h4>Print Design</h4>
          <div class="skills__design--progress">
            <span class="skills__design--progress__3"></span>
          </div>
          <h4>Graphic Design</h4>
          <div class="skills__design--progress">
            <span class="skills__design--progress__4"></span>
          </div>
        </div>
        <div class="skills__coding">
          <h3 class="skills__coding--title">Coign Skills</h3>
          <h4>HTML</h4>
          <div class="skills__coding--progress">
            <span class="skills__coding--progress__1"></span>
          </div>
          <h4>CSS</h4>
          <div class="skills__coding--progress">
            <span class="skills__coding--progress__2"></span>
          </div>
          <h4>Javascript</h4>
          <div class="skills__coding--progress">
            <span class="skills__coding--progress__3"></span>
          </div>
          <h4>Typescript</h4>
          <div class="skills__coding--progress">
            <span class="skills__coding--progress__4"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="script.js"></script>
</html>

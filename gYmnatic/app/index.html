<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->

    <link
      href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&family=Roboto:wght@100;300;400;500;700;900&display=swap"
      rel="stylesheet" />

    <!-- Font Awesome -->

    <script
      src="https://kit.fontawesome.com/fbadad80a0.js"
      crossorigin="anonymous"></script>

    <!-- Favicon -->
    <link rel="shortcut icon" type="image/svg" href="img/logo/favicon.svg" />

    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="css/main-style.css" />

    <title>gYmantic | Bring fitness to your world</title>
  </head>
  <body class="container">
    <!--*******************Header*******************-->
    <header class="header">
      <!-- Hamburger Lines Container -->
      <div class="header__menu">
        <div class="header__menu--line"></div>
      </div>

      <!-- Overlay -->
      <div class="header__overlay"></div>

      <!-- Navigation -->
      <nav class="header__nav">
        <a href="#" class="header__nav--logo"
          ><img src="img/logo/logo.svg" alt="logo"
        /></a>

        <ul class="header__nav--links">
          <li class="header__nav--links__item">
            <a href="#" data-text="Home">Home</a>
          </li>

          <li class="header__nav--links__item">
            <a href="#" data-text="About">About</a>
          </li>

          <li class="header__nav--links__item">
            <a href="#" data-text="Classes">Classes</a>
          </li>

          <li class="header__nav--links__item">
            <a href="#" data-text="Events">Events</a>
          </li>

          <li class="header__nav--links__item">
            <a href="#" data-text="News">News</a>
          </li>

          <li class="header__nav--links__item">
            <a href="#" data-text="Shop">Shop</a>
          </li>

          <div class="header__nav--links__toggle-container">
            <input type="checkbox" id="toggle" name="theme" />
          </div>
        </ul>
      </nav>
    </header>
    <!--*******************HeSHowcaseader*******************-->
    <section class="showcase">
      <div class="showcase__content">
        <h1 class="showcase__content--title">Commit to be fit</h1>
        <p class="showcase__content--para">
          Lorem ipsum dolor, sit amet consectetur adipisicing elit. Similique,
          est.
        </p>
        <div class="showcase__content--links">
          <a href="#">Find out more</a>
          <a href="#">Join now</a>
        </div>
      </div>
    </section>
    <!--*******************Motto*******************-->
    <section class="motto">Motto</section>
    <!--*******************Features*******************-->
    <section class="features">Features</section>
    <!--*******************Trainers*******************-->
    <section class="trainers">Trainers</section>
    <!--*******************Testimonials*******************-->
    <section class="testimonials">Testimonials</section>
    <!--*******************Cilents*******************-->
    <section class="clients">Cilents</section>
    <!--*******************Register*******************-->
    <section class="register">Register</section>
    <!--*******************Footer*******************-->
    <footer class="footer">Footer</footer>

    <!-- *-*-*-*-*-*-*-*-*-*-*-*-*-*-* JavaScript Files *-*-*-*-*-*-*-*-*-*-*-*-*-*-* -->
    <!-- Nav -->
    <script src="js/nav.js"></script>

    <!-- Dark Mode -->
    <script src="js/dark-mode.js"></script>

    <!-- Testimonials -->
    <script src="js/testimonials.js"></script>

    <!-- Scroll -->
    <script src="js/scroll.js"></script>

    <!-- Form -->
    <script src="js/form.js"></script>
  </body>
</html>
